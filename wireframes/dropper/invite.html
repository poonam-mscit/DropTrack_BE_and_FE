<!doctype html>
<html><head><meta charset="utf-8"><title>Dropper · Accept invite</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  body { background: #18181B; }
  .ribbon { background: rgba(163,230,53,.14); color: #A3E635; padding: 5px 12px; border-radius: 999px; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; letter-spacing:.06em; }
  .ribbon::before { content:''; width:6px; height:6px; background:#A3E635; border-radius:50%; box-shadow:0 0 8px rgba(163,230,53,.6); }
  .hero-title { font-size: 26px; line-height: 1.1; font-weight: 800; letter-spacing: -0.025em; margin: 16px 0 8px; }
  .hero-title .serif { font-family:'Instrument Serif', serif; font-style: italic; font-weight: 400; color: rgba(255,255,255,.55); }
  .lede { font-size: 14px; color: rgba(255,255,255,.6); line-height: 1.55; margin: 0 0 20px; }
  .field { margin-bottom: 12px; }
  .field label { display:block; font-size: 11.5px; color: rgba(255,255,255,.55); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .06em; }
  .field input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; color: #fff; font-family: inherit; font-size: 14px; }
  .field input:focus { outline: none; border-color: #A3E635; }
  label.checkbox-row { display:flex; gap:10px; align-items:flex-start; font-size:12px; color: rgba(255,255,255,.6); line-height: 1.5; margin: 16px 0 0; }
</style>
</head>
<body>
<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-content">
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:38px; height:38px; border-radius:11px; background: linear-gradient(135deg,#4F46E5,#7C3AED 50%,#A3E635); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:16px;">D</div>
      <strong style="font-size:15px;">DropTrack</strong>
      <span class="ribbon" style="margin-left:auto;">Invite valid 7 days</span>
    </div>

    <h1 class="hero-title">Welcome, Lin <span class="serif">— let's set you up.</span></h1>
    <p class="lede">Create a password to activate your DropTrack account. You'll fill out the rest of your details on the next screen.</p>

    <div class="field"><label>Email</label><input value="lin@example.com" disabled style="color: rgba(255,255,255,.5);"></div>
    <div class="field"><label>Create password</label><input type="password" placeholder="At least 10 characters"></div>
    <div class="field"><label>Confirm password</label><input type="password" placeholder="Re-enter password"></div>

    <label class="checkbox-row">
      <input type="checkbox" style="margin-top: 2px;">
      <span>I agree DropTrack owns all GPS &amp; tracking data collected during shifts, per the <a href="#" style="color:#A3E635;">Privacy Policy</a>.</span>
    </label>

    <a href="profile.html" class="btn-accent" style="margin-top: 18px; text-decoration:none; display:flex;">Create account <i data-lucide="arrow-right" style="width:16px;height:16px;"></i></a>
    <p style="font-size:11px; color: rgba(255,255,255,.4); text-align:center; margin-top: 12px;">By continuing you confirm you are 18+ and entitled to work in Australia.</p>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body></html>
