<!doctype html>
<html><head><meta charset="utf-8"><title>Dropper · Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>body { background:#18181B; }</style>
</head>
<body>
<div class="phone">
  <div class="phone-notch"></div>
  <div class="phone-content">
    <div style="text-align:center; padding: 20px 0;">
      <div style="width:64px; height:64px; background:#A3E635; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:32px;"></div>
      <h2 style="margin: 14px 0 4px; font-size:22px;">Great work!</h2>
      <p style="color:#A1A1AA; font-size:13px; margin:0;">Spring Listings · Bondi complete</p>
    </div>

    <div class="card-dark">
      <div class="map-placeholder" style="height: 200px; border-radius:8px; filter:brightness(.9);">
        <div class="zone-poly" style="top:10px; left:20px; width:280px; height:160px;"></div>
        <svg style="position:absolute; top:10px; left:20px; width:280px; height:160px;">
          <path d="M 30 150 L 60 110 L 100 110 L 100 70 L 160 70 L 160 40 L 220 40" stroke="#10B981" stroke-width="3" fill="none" stroke-linecap="round" />
        </svg>
      </div>
      <div style="font-size:12px; color:#A1A1AA; text-align:center; margin-top:10px;">Your walked route · replay available</div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:14px;">
      <div class="card-dark" style="margin:0; padding:14px; text-align:center;"><div style="font-size:11px; color:#A1A1AA;">Drops</div><strong style="font-size:22px; color:#A3E635;">1,250</strong></div>
      <div class="card-dark" style="margin:0; padding:14px; text-align:center;"><div style="font-size:11px; color:#A1A1AA;">Coverage</div><strong style="font-size:22px; color:#A3E635;">96%</strong></div>
      <div class="card-dark" style="margin:0; padding:14px; text-align:center;"><div style="font-size:11px; color:#A1A1AA;">Distance</div><strong style="font-size:18px;">7.4 km</strong></div>
      <div class="card-dark" style="margin:0; padding:14px; text-align:center;"><div style="font-size:11px; color:#A1A1AA;">Duration</div><strong style="font-size:18px;">5h 48m</strong></div>
    </div>

    <div class="card-dark" style="margin-top:14px; background:linear-gradient(135deg,#1E1B4B,#3730A3); border:none;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
        <strong style="font-size:13px;"><i data-lucide="shield-check" style="width:14px;height:14px;display:inline-block;vertical-align:-2px;"></i> AI Fraud Shield</strong>
        <span style="background:#A3E635; color:#0a0a0a; padding:2px 6px; border-radius:4px; font-size:9px; font-weight:700; margin-left:auto;">VERIFIED</span>
      </div>
      <p style="font-size:12px; color:#D4D4D8; margin:0;">All 1,250 drops verified. GPS integrity 100%. Client will see authenticated report.</p>
    </div>

    <div class="card-dark" style="margin-top:14px;">
      <strong style="font-size:13px;">⭐ Rate your shift</strong>
      <div style="display:flex; gap:8px; margin-top:10px; font-size:24px; cursor:pointer;">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <textarea class="input" rows="2" placeholder="Notes (optional)" style="background:#27272A; border-color:#3F3F46; color:#fff; margin-top:10px; font-size:12px;"></textarea>
    </div>

    <a href="jobs.html" class="btn-accent" style="margin-top:16px; text-decoration:none; display:flex;">Done</a>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><script>lucide.createIcons();</script>
</body></html>
